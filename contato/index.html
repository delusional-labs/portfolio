<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Contato DELUSIONAL. Envie os detalhes do projeto e receba retorno rapido." />
  <title>Contato | DELUSIONAL</title>
  <link rel="icon" href="/favicon-delusional.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@700;800;900&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --delusion-paper: #fbf7ff;
      --delusion-ink: #120d17;
      --delusion-ink-soft: rgba(18, 13, 23, 0.72);
      --delusion-surface: #111113;
      --delusion-accent: #8b3dff;
      --delusion-line: rgba(18, 13, 23, 0.12);
      --delusion-shadow: 14px 14px 0 rgba(139, 61, 255, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top center, rgba(139, 61, 255, 0.16), transparent 38%),
        var(--delusion-surface);
      color: var(--delusion-paper);
      font-family: "Archivo", sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 26px 26px;
      opacity: 0.24;
      pointer-events: none;
    }

    a,
    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .contact-page {
      position: relative;
      z-index: 1;
      width: min(1080px, calc(100% - 32px));
      margin: 0 auto;
      padding: 18px 0 40px;
    }

    .contact-topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
      margin-bottom: 28px;
    }

    .contact-topbar__logo {
      display: inline-flex;
      align-items: center;
      line-height: 0;
    }

    .contact-topbar__logo img {
      display: block;
      width: clamp(148px, 15vw, 196px);
      height: auto;
    }

    .contact-topbar__button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      border: 2px solid var(--delusion-paper);
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 800;
      transition: transform 180ms ease, background 180ms ease, color 180ms ease;
    }

    .contact-topbar__button:hover,
    .contact-topbar__button:focus-visible {
      background: var(--delusion-paper);
      color: var(--delusion-ink);
      transform: translateY(-2px);
      outline: none;
    }

    .contact-shell {
      border: 2px solid #101010;
      background: rgba(249, 245, 255, 0.96);
      color: var(--delusion-ink);
      box-shadow: var(--delusion-shadow);
      padding: clamp(22px, 3vw, 38px);
    }

    .contact-kicker {
      display: inline-flex;
      align-items: center;
      padding: 8px 12px 7px;
      border: 2px solid #101010;
      background: #101010;
      color: var(--delusion-paper);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .contact-title {
      margin: 18px 0 10px;
      font-family: "Barlow Condensed", sans-serif;
      font-size: clamp(4rem, 9vw, 7.8rem);
      line-height: 0.88;
      text-transform: uppercase;
    }

    .contact-copy {
      max-width: 34ch;
      margin: 0 0 12px;
      color: var(--delusion-ink-soft);
      line-height: 1.7;
      font-size: 1rem;
    }

    .contact-note {
      display: inline-flex;
      align-items: center;
      min-height: 40px;
      padding: 8px 12px 7px;
      border: 1px solid var(--delusion-line);
      background: rgba(16, 16, 16, 0.04);
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--delusion-ink-soft);
    }

    .contact-form {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-top: 28px;
    }

    .contact-field {
      display: grid;
      gap: 8px;
    }

    .contact-field--full {
      grid-column: 1 / -1;
    }

    .contact-field label {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .contact-field input,
    .contact-field select,
    .contact-field textarea {
      width: 100%;
      border: 2px solid #101010;
      border-radius: 0;
      background: rgba(255, 255, 255, 0.78);
      color: var(--delusion-ink);
      padding: 14px 14px 12px;
      outline: none;
      transition: box-shadow 180ms ease, transform 180ms ease, background 180ms ease;
    }

    .contact-field textarea {
      min-height: 170px;
      resize: vertical;
    }

    .contact-field input:focus,
    .contact-field select:focus,
    .contact-field textarea:focus {
      background: #ffffff;
      box-shadow: 8px 8px 0 rgba(139, 61, 255, 0.16);
      transform: translate(-2px, -2px);
    }

    .contact-actions {
      grid-column: 1 / -1;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      margin-top: 6px;
    }

    .contact-submit,
    .contact-secondary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 54px;
      padding: 14px 20px 12px;
      border: 2px solid #101010;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      transition: transform 180ms ease, box-shadow 180ms ease, background 180ms ease, color 180ms ease;
      cursor: pointer;
    }

    .contact-submit {
      background: #101010;
      color: var(--delusion-paper);
      box-shadow: 9px 9px 0 rgba(139, 61, 255, 0.58);
    }

    .contact-secondary {
      background: transparent;
      color: #101010;
      box-shadow: 9px 9px 0 rgba(16, 16, 16, 0.1);
    }

    .contact-submit:hover,
    .contact-secondary:hover,
    .contact-submit:focus-visible,
    .contact-secondary:focus-visible {
      transform: translate(4px, 4px);
      box-shadow: 5px 5px 0 rgba(139, 61, 255, 0.5);
      outline: none;
    }

    @media (max-width: 767px) {
      .contact-page {
        width: min(100% - 20px, 1080px);
        padding-top: 12px;
      }

      .contact-form,
      .contact-topbar {
        grid-template-columns: 1fr;
      }

      .contact-title {
        text-wrap: balance;
      }

      .contact-actions {
        flex-direction: column;
        align-items: stretch;
      }
    }
  </style>
</head>
<body>
  <main class="contact-page">
    <header class="contact-topbar">
      <a class="contact-topbar__logo" href="/" aria-label="DELUSIONAL">
        <img src="/delusionallogo.png" alt="DELUSIONAL" />
      </a>
      <a class="contact-topbar__button" href="/">Voltar</a>
    </header>

    <section class="contact-shell" aria-labelledby="contact-title">
      <span class="contact-kicker">Contato</span>
      <h1 id="contact-title" class="contact-title">Fale o essencial.</h1>
      <p class="contact-copy">
        Conta o que precisa entrar de pe primeiro e a gente responde com o melhor caminho.
      </p>
      <div class="contact-note">Resposta inicial em até 1 dia útil.</div>

      <form class="contact-form" id="contact-form">
        <div class="contact-field">
          <label for="name">Nome</label>
          <input id="name" name="name" type="text" required />
        </div>

        <div class="contact-field">
          <label for="email">E-mail</label>
          <input id="email" name="email" type="email" required />
        </div>

        <div class="contact-field">
          <label for="company">Marca ou empresa</label>
          <input id="company" name="company" type="text" />
        </div>

        <div class="contact-field">
          <label for="service">Foco principal</label>
          <select id="service" name="service">
            <option value="Web Development">Web Development</option>
            <option value="Design">Design</option>
            <option value="Automation AI">Automation AI</option>
            <option value="Pacotes">Pacotes</option>
          </select>
        </div>

        <div class="contact-field contact-field--full">
          <label for="message">Mensagem</label>
          <textarea id="message" name="message" placeholder="Contexto, objetivo, urgencia e qualquer detalhe importante." required></textarea>
        </div>

        <div class="contact-actions">
          <button class="contact-submit" type="submit">Enviar contato</button>
          <a class="contact-secondary" href="/pacotes/">Ver pacotes</a>
        </div>
      </form>
    </section>
  </main>

  <script>
    const form = document.getElementById("contact-form");

    form?.addEventListener("submit", (event) => {
      event.preventDefault();

      const data = new FormData(form);
      const name = data.get("name") || "";
      const email = data.get("email") || "";
      const company = data.get("company") || "";
      const service = data.get("service") || "";
      const message = data.get("message") || "";

      const subject = encodeURIComponent(`Novo contato DELUSIONAL - ${service}`);
      const body = encodeURIComponent(
        `Nome: ${name}\nE-mail: ${email}\nMarca ou empresa: ${company}\nFoco principal: ${service}\n\nMensagem:\n${message}`
      );

      window.location.href = `mailto:contato@delusional.studio?subject=${subject}&body=${body}`;
    });
  </script>
</body>
</html>
